[colors]
background = #191724
background-alt = #403d52
foreground = #e0def4
primary = #e0def4
secondary = #e0def4
alert = #e0def4
disabled = #6e6a86

[bar/workspaces]
width = 100%
height = 26pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 4pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
font-0 = monospace:size=12;2
modules-left = xworkspaces xwindow
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
tray-position = adaptive
bottom = false

[bar/stat]
width = 100%
height = 26pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 4pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
font-0 = monospace:size=12;2
modules-right = filesystem xkeyboard pulseaudio cpu ctemp ram gpu gtemp vram eth date tray
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
tray-position = adaptive
bottom = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /
mount-1 = /home
mount-2 = /mnt/data1

label-mounted = %{F-}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "vol "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/ram]
type = internal/memory
interval = 2
format-prefix = "ram "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "cpu "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/ctemp]
type = custom/script
interval = 2
exec = pb-ctemp zenpower-pci-00c3 Tdie
format-prefix = "cpu¬į "
format-suffix = "¬įC"

[module/gpu]
type = custom/script
interval = 2
exec = pb-gusage 0
format-prefix = "gpu "
format-suffix = "%"

[module/gtemp]
type = custom/script
interval = 2
exec = pb-gtemp 0
format-prefix = "gpu¬į "
format-suffix = "¬įC"

[module/vram]
type = custom/script
interval = 2
exec = pb-vram 0
format-prefix = "vram "
format-suffix = "%"

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F-}%ifname%%{F-} down
label-connected = %{F-}%ifname%%{F-} up

[module/wlan]
inherit = network-base
interface-type = wireless
# label-connected = %{F-}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
# label-connected = %{F-}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/tray]
type = internal/tray

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
